name: Publish release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build, pack, and publish
    runs-on: ubuntu-latest
    environment: Public Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid version tag such as v1.2.3"
            exit 1
          fi

          echo "number=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/Aelian.FFT/Aelian.FFT.csproj

      - name: Build
        run: >
          dotnet build
          src/Aelian.FFT/Aelian.FFT.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.number }}

      - name: Pack
        run: >
          dotnet pack
          src/Aelian.FFT/Aelian.FFT.csproj
          --configuration Release
          --no-build
          --output artifacts
          -p:Version=${{ steps.version.outputs.number }}

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.version.outputs.tag }}"
          artifacts/*.nupkg
          --verify-tag
          --generate-notes
          --title "${{ steps.version.outputs.tag }}"